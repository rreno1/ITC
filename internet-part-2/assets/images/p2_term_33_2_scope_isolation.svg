<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad_201" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#151f32" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="hsl(210, 90%, 55%)" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="600" height="200" fill="url(#bgGrad_201)" rx="10" />
  <rect width="594" height="194" x="3" y="3" fill="none" stroke="hsl(210, 90%, 55%)" stroke-width="1.5" stroke-opacity="0.35" rx="9" />
  <text x="15" y="22" fill="#64748b" font-family="sans-serif" font-size="10" font-weight="bold">NETWORKING TECHNICAL SCHEMATIC #201</text>
  
      <g transform="translate(80, 30)">
        <!-- Node A (Sender) -->
        <rect x="20" y="35" width="100" height="60" rx="8" fill="#1e293b" stroke="hsl(210, 90%, 55%)" stroke-width="2.5" />
        <text x="70" y="62" text-anchor="middle" fill="hsl(210, 90%, 55%)" font-family="sans-serif" font-size="12" font-weight="bold">NODE A</text>
        <text x="70" y="78" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">Originator</text>
        <!-- Connection Pipe with Packet -->
        <line x1="120" y1="65" x2="320" y2="65" stroke="#475569" stroke-width="4" />
        <rect x="190" y="52" width="60" height="26" rx="4" fill="hsl(255, 85%, 50%)" stroke="#ffffff" stroke-width="1.5" />
        <text x="220" y="69" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">PACKET</text>
        <!-- Node B (Receiver) -->
        <rect x="320" y="35" width="100" height="60" rx="8" fill="#1e293b" stroke="hsl(255, 85%, 50%)" stroke-width="2.5" />
        <text x="370" y="62" text-anchor="middle" fill="hsl(255, 85%, 50%)" font-family="sans-serif" font-size="12" font-weight="bold">NODE B</text>
        <text x="370" y="78" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">Destination</text>
        <!-- Technical Label -->
        <text x="220" y="135" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="bold">Scope Isolation</text>
      </g>
    
